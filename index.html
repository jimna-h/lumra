<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lumra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;touch-action:manipulation;user-select:none;}
body{
  font-family:'Cinzel',serif;
  min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem 1.25rem;
  background:#0e1a0e;
  position:relative;overflow:hidden;
}
.bg{
  position:fixed;inset:0;
  background:url('img/Lumra.webp') center center/cover no-repeat;
  opacity:0.35;
  z-index:0;
}
.bg-scrim{
  position:fixed;inset:0;
  background:rgba(8,14,8,0.55);
  z-index:0;
}
.wrapper{position:relative;z-index:1;width:100%;max-width:400px;display:flex;flex-direction:column;gap:1rem;}

/* ── COUNTER CARD ── */
.counter-card{
  background:rgba(10,20,10,0.72);
  border:1px solid rgba(90,158,90,0.25);
  border-radius:16px;
  overflow:hidden;
  backdrop-filter:blur(6px);
}
.counter-label{
  font-size:0.6rem;letter-spacing:0.2em;
  color:#c4902a;text-align:center;
  padding:12px 0 0;
}
.counter-inner{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  min-height:110px;
}
.tap-zone{
  position:absolute;top:0;bottom:0;width:50%;
  cursor:pointer;z-index:0;
  transition:background-color 0.06s;
}
.tap-zone.left{left:0;}
.tap-zone.right{right:0;}
.tap-zone.left.active{background:rgba(200,60,50,0.2);}
.tap-zone.right.active{background:rgba(90,158,90,0.2);}
.counter-mid{position:relative;z-index:1;pointer-events:none;text-align:center;}
.counter-number{
  font-size:3.8rem;font-weight:700;
  color:#f0e8d0;line-height:1;
}
.counter-sub{
  font-size:0.62rem;letter-spacing:0.12em;
  color:rgba(200,184,152,0.6);
  margin-top:5px;padding-bottom:14px;
}
.counter-edge-hints{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
}
.edge-hint{font-size:1.8rem;font-weight:700;color:rgba(240,232,208,0.15);line-height:1;}

/* pips row inside cost card */
.pips{display:flex;justify-content:center;gap:5px;margin:4px 0 0;pointer-events:none;position:relative;z-index:1;}
.pip{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.pip-c{background:#444;color:#ddd;border:1px solid #777;}
.pip-g{background:#1a4020;color:#6ecf6e;border:1px solid #3a8c3a;}

/* Reset */
.reset-btn{
  width:100%;background:transparent;
  border:1px solid rgba(140,40,40,0.5);
  border-radius:10px;padding:14px;
  color:rgba(200,100,100,0.7);
  font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.15em;
  cursor:pointer;transition:background 0.15s,color 0.15s;
}
.reset-btn:hover{background:rgba(160,40,40,0.15);color:#e09090;}
.reset-btn:active{background:rgba(160,40,40,0.25);}
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-scrim"></div>

<div class="wrapper">

  <div class="counter-card">
    <div class="counter-label">LUMRA COSTS</div>
    <div class="counter-inner">
      <div class="tap-zone left" id="cast-minus"></div>
      <div class="tap-zone right" id="cast-plus"></div>
      <div class="counter-edge-hints">
        <span class="edge-hint">−</span>
        <span class="edge-hint">+</span>
      </div>
      <div class="counter-mid">
        <div class="counter-number" id="cost-val">6</div>
        <div class="pips" id="pips"></div>
        <div class="counter-sub" id="cost-sub">BASE COST</div>
      </div>
    </div>
  </div>

  <div class="counter-card">
    <div class="counter-label">LUMRA SIZE</div>
    <div class="counter-inner">
      <div class="tap-zone left" id="land-minus"></div>
      <div class="tap-zone right" id="land-plus"></div>
      <div class="counter-edge-hints">
        <span class="edge-hint">−</span>
        <span class="edge-hint">+</span>
      </div>
      <div class="counter-mid">
        <div class="counter-number" id="pt-val">0/0</div>
        <div class="counter-sub" id="pt-sub">LANDS YOU CONTROL</div>
      </div>
    </div>
  </div>

  <button class="reset-btn" id="reset-btn">↺ RESET GAME</button>

</div>

<script>
var BASE = 6;
var casts = 0, lands = 0;

function renderPips(total){
  var generic = total - 2;
  var html = '<span class="pip pip-c">'+generic+'</span>';
  html += '<span class="pip pip-g">G</span><span class="pip pip-g">G</span>';
  document.getElementById('pips').innerHTML = html;
}

function render(){
  var cost = BASE + casts * 2;
  document.getElementById('cost-val').textContent = cost;
  renderPips(cost);
  document.getElementById('cost-sub').textContent = casts === 0 ? 'BASE COST' : 'COMMANDER TAX +' + (casts*2);
  document.getElementById('pt-val').textContent = lands + '/' + lands;
}

function zone(id, fn){
  var el = document.getElementById(id);
  el.addEventListener('pointerdown', function(e){
    e.preventDefault(); el.classList.add('active'); fn();
  });
  function end(){ el.classList.remove('active'); }
  el.addEventListener('pointerup', end);
  el.addEventListener('pointerleave', end);
  el.addEventListener('pointercancel', end);
}

zone('cast-minus', function(){ if(casts>0){casts--;render();} });
zone('cast-plus',  function(){ casts++;render(); });
zone('land-minus', function(){ if(lands>0){lands--;render();} });
zone('land-plus',  function(){ lands++;render(); });

document.getElementById('reset-btn').addEventListener('click', function(){ casts=0;lands=0;render(); });

render();
</script>
</body>
</html>
