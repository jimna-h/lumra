<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lumra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;touch-action:manipulation;user-select:none;}
body{
  font-family:'Cinzel',serif;
  min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding:0 1.25rem 3rem;
  background:#0e1a0e;
  position:relative;overflow:hidden;
}
.bg{position:fixed;inset:0;background:url('img/Lumra.webp') center center/cover no-repeat;opacity:0.55;z-index:0;}
.bg-scrim{position:fixed;inset:0;background:linear-gradient(to bottom,rgba(8,14,8,0.2) 0%,rgba(8,14,8,0.65) 70%);z-index:0;}
.wrapper{position:relative;z-index:1;width:100%;max-width:400px;display:flex;flex-direction:column;gap:1rem;}

.counter-card{
  background:rgba(10,20,10,0.72);
  border:1px solid rgba(90,158,90,0.25);
  border-radius:16px;
  overflow:hidden;
  backdrop-filter:blur(6px);
  position:relative;
  min-height:130px;
  display:flex;align-items:flex-end;justify-content:center;
}
.tap-zone{
  position:absolute;top:0;bottom:0;width:50%;
  cursor:pointer;z-index:0;
  transition:background-color 0.06s;
}
.tap-zone.left{left:0;}
.tap-zone.right{right:0;}
.tap-zone.left.active{background:rgba(200,60,50,0.2);}
.tap-zone.right.active{background:rgba(90,158,90,0.2);}

.card-content{
  position:relative;z-index:1;pointer-events:none;
  text-align:center;padding:12px 0 18px;width:100%;
}
.counter-label{
  font-size:0.6rem;letter-spacing:0.2em;
  color:#c4902a;margin-bottom:8px;
}
.counter-number{
  font-size:3.8rem;font-weight:700;
  color:#f0e8d0;line-height:1;
}
.counter-edge-hints{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
}
.edge-hint{font-size:1.8rem;font-weight:700;color:rgba(240,232,208,0.15);line-height:1;}

.reset-btn{
  width:100%;background:transparent;
  border:1px solid rgba(140,40,40,0.5);
  border-radius:10px;padding:14px;
  color:rgba(200,100,100,0.7);
  font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.15em;
  cursor:pointer;transition:background 0.15s,color 0.15s;
}
.reset-btn:active{background:rgba(160,40,40,0.25);}
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-scrim"></div>

<div class="wrapper">

  <div class="counter-card">
    <div class="tap-zone left" id="cast-minus"></div>
    <div class="tap-zone right" id="cast-plus"></div>
    <div class="counter-edge-hints">
      <span class="edge-hint">−</span>
      <span class="edge-hint">+</span>
    </div>
    <div class="card-content">
      <div class="counter-label">LUMRA COSTS</div>
      <div class="counter-number" id="cost-val">6</div>
    </div>
  </div>

  <div class="counter-card">
    <div class="tap-zone left" id="land-minus"></div>
    <div class="tap-zone right" id="land-plus"></div>
    <div class="counter-edge-hints">
      <span class="edge-hint">−</span>
      <span class="edge-hint">+</span>
    </div>
    <div class="card-content">
      <div class="counter-label">LUMRA SIZE</div>
      <div class="counter-number" id="pt-val">0/0</div>
    </div>
  </div>

  <button class="reset-btn" id="reset-btn">↺ RESET GAME</button>

</div>

<script>
var casts = 0, lands = 0;

function render(){
  document.getElementById('cost-val').textContent = 6 + casts * 2;
  document.getElementById('pt-val').textContent = lands + '/' + lands;
}

var HOLD_DELAY = 400, HOLD_INTERVAL = 100;

function makeZone(id, fn){
  var el = document.getElementById(id);
  var timer = null, interval = null;
  function start(e){
    e.preventDefault();
    el.classList.add('active');
    fn();
    timer = setTimeout(function(){ interval = setInterval(fn, HOLD_INTERVAL); }, HOLD_DELAY);
  }
  function stop(){
    el.classList.remove('active');
    clearTimeout(timer); clearInterval(interval);
    timer = null; interval = null;
  }
  el.addEventListener('pointerdown', start);
  el.addEventListener('pointerup', stop);
  el.addEventListener('pointerleave', stop);
  el.addEventListener('pointercancel', stop);
}

makeZone('cast-minus', function(){ if(casts>0){casts--;render();} });
makeZone('cast-plus',  function(){ casts++;render(); });
makeZone('land-minus', function(){ if(lands>0){lands--;render();} });
makeZone('land-plus',  function(){ lands++;render(); });
document.getElementById('reset-btn').addEventListener('click', function(){ casts=0;lands=0;render(); });

render();
</script>
</body>
</html>
